<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
    <title>Monster-World</title>
    <script>
        // Monkeypatch window.addEventListener globally to intercept and block 'resize' events when keyboard is open
        const originalAddEventListener = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
            if (type === 'resize') {
                const wrappedListener = function(event) {
                    const activeEl = document.activeElement;
                    const isInput = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');
                    if (isInput) {
                        return; // Block event propagation to Phaser
                    }
                    listener.call(this, event);
                };
                listener.__wrappedResize = wrappedListener;
                originalAddEventListener.call(this, type, wrappedListener, options);
            } else {
                originalAddEventListener.call(this, type, listener, options);
            }
        };

        const originalRemoveEventListener = window.removeEventListener;
        window.removeEventListener = function(type, listener, options) {
            if (type === 'resize' && listener.__wrappedResize) {
                originalRemoveEventListener.call(this, type, listener.__wrappedResize, options);
            } else {
                originalRemoveEventListener.call(this, type, listener, options);
            }
        };

        let initialHeight = window.innerHeight;

        function lockViewportHeight() {
            initialHeight = window.innerHeight;
            document.documentElement.style.height = `${initialHeight}px`;
            document.body.style.height = `${initialHeight}px`;
            const container = document.getElementById("game-container");
            if (container) {
                container.style.height = `${initialHeight}px`;
                container.style.transform = 'none';
            }
        }

        lockViewportHeight();

        // Register our own internal resize listener using the original addEventListener so it is never blocked
        originalAddEventListener.call(window, 'resize', () => {
            const container = document.getElementById("game-container");
            if (!container) return;

            const activeEl = document.activeElement;
            const isInput = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');

            if (isInput) {
                // Shift the container up by the height difference (keyboard height)
                const currentHeight = window.innerHeight;
                const keyboardHeight = initialHeight - currentHeight;
                if (keyboardHeight > 0) {
                    container.style.transform = `translateY(-${keyboardHeight}px)`;
                } else {
                    container.style.transform = 'none';
                }
            } else {
                lockViewportHeight();
            }
        });

        // Reset translation immediately when the input is blurred
        document.addEventListener('focusout', (e) => {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
                const container = document.getElementById("game-container");
                if (container) {
                    container.style.transform = 'none';
                }
            }
        });

        originalAddEventListener.call(window, 'orientationchange', () => {
            setTimeout(lockViewportHeight, 200);
        });
    </script>
    <style>
        html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1d1d1d;
        }

        #game-container {
        width: 100vw;
        height: 100vh;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Importing Nunito, Coiny, Press Start 2P, Rubik Spray Paint, and Lilita One -->
    <link href="https://fonts.googleapis.com/css2?family=Coiny&family=Press+Start+2P&family=Rubik+Spray+Paint&family=Lilita+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hidden DOM elements using the web fonts to force browser caching/preloading -->
    <div style="font-family: 'Lilita One'; position: absolute; left: -9999px; visibility: hidden;">Lilita One Preload</div>
    <div style="font-family: 'Coiny'; position: absolute; left: -9999px; visibility: hidden;">Coiny Preload</div>
    <div style="font-family: 'Press Start 2P'; position: absolute; left: -9999px; visibility: hidden;">Press Start 2P Preload</div>
    <div style="font-family: 'Rubik Spray Paint'; position: absolute; left: -9999px; visibility: hidden;">Rubik Spray Paint Preload</div>
    <div style="font-family: 'Nunito'; position: absolute; left: -9999px; visibility: hidden;">Nunito Preload</div>

    <div id="game-container"></div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins/dist/rexvirtualjoystickplugin.min.js"></script>

    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script  type="module" src="frontend/core.js"></script>
</body>
</html>
